<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hearing — The Five Senses</title>
  <link href="https://fonts.googleapis.com/css2?family=Rock+3D&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ear.css">
</head>
<body>

<div id="cursor"></div>

<a class="back" href="index.html">
  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
    <path d="M9 2L4 7l5 5"/>
  </svg>
</a>

<div id="stage">
  <div id="ear-wrap">
    <img src="picture/Bigear.svg" alt="Ear">
  </div>
  <div id="earbud-wrap">
    <img src="picture/earbud.svg" alt="Earbud">
  </div>
  <button id="pupil-btn" onclick="toggleMainEar()">
    <span id="pupil-sign">+</span>
  </button>
</div>

<div class="elem" id="e0">
  <img src="picture/ear1.svg">
  <button class="detail-btn" onclick="toggleDetail(0)">▶</button>
  <audio class="detail-audio" src="audio/audio1.mp3" loop></audio>
</div>

<div class="elem" id="e1">
  <img src="picture/ear2.svg">
  <button class="detail-btn" onclick="toggleDetail(1)">▶</button>
  <audio class="detail-audio" src="audio/audio2.mp3" loop></audio>
</div>

<div class="elem" id="e2">
  <img src="picture/ear3.svg">
  <button class="detail-btn" onclick="toggleDetail(2)">▶</button>
  <audio class="detail-audio" src="audio/audio3.mp3" loop></audio>
</div>

<div class="elem" id="e3">
  <img src="picture/ear4.svg">
  <button class="detail-btn" onclick="toggleDetail(3)">▶</button>
  <audio class="detail-audio" src="audio/audio4.mp3" loop></audio>
</div>

<div class="elem" id="e4">
  <img src="picture/ear5.svg">
  <button class="detail-btn" onclick="toggleDetail(4)">▶</button>
  <audio class="detail-audio" src="audio/audio5.mp3" loop></audio>
</div>

<div id="sense-label">Hearing</div>

<script src="ear.js"></script>
</body>
</html>
