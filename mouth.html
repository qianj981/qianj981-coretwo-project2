<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taste — The Five Senses</title>
  <link href="https://fonts.googleapis.com/css2?family=Rock+3D&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mouth.css">
</head>
<body>

  <div id="cursor"></div>

  <a class="back" href="index.html">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
      <path d="M9 2L4 7l5 5"/>
    </svg>
  </a>

  <!-- Mouth illustration — centred -->
  <div id="mouth-wrap">
    <img src="picture/Bigmouth.svg" alt="Mouth">
  </div>

  <!-- ── Green blob → 8.jpg ── -->
  <button class="shape-btn" id="btn-green" onclick="toggleShape('green')">
    <img src="picture/green.svg" alt="">
    <span class="shape-sign">+</span>
  </button>
  <div class="photo-panel" id="panel-green">
    <img src="picture/8.jpg" alt="Taste">
  </div>

  <!-- ── Red blob → 7.jpg ── -->
  <button class="shape-btn" id="btn-red" onclick="toggleShape('red')">
    <img src="picture/red.svg" alt="">
    <span class="shape-sign">+</span>
  </button>
  <div class="photo-panel" id="panel-red">
    <img src="picture/7.jpg" alt="Taste">
  </div>

  <!-- ── Star → 6.jpg ── -->
  <button class="shape-btn" id="btn-star" onclick="toggleShape('star')">
    <img src="picture/star.svg" alt="">
    <span class="shape-sign">+</span>
  </button>
  <div class="photo-panel" id="panel-star">
    <img src="picture/6.jpg" alt="Taste">
  </div>

  <!-- ── Ring → text ── -->
  <button class="shape-btn" id="btn-ring" onclick="toggleShape('ring')">
    <img src="picture/ring.svg" alt="">
    <span class="shape-sign">+</span>
  </button>
  <div class="text-panel" id="panel-ring">
    <div class="text-panel-title">Lip Ring</div>
    <div class="text-panel-body">
      Click, clink, zing! A lip ring: tiny metal, big attitude, making your face go bling-blang every time you talk.
    </div>
  </div>

  <!-- ── 📢 Audio → talk.mp3 ── -->
  <button id="btn-audio" onclick="toggleAudio()">
    <span class="audio-emoji">🎺</span>
    <span class="shape-sign">+</span>
  </button>
  <div class="audio-panel" id="panel-audio">
    <audio id="audio-el" src="audio/talk.mp3"></audio>
    <div class="audio-wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <button class="audio-stop-btn" onclick="toggleAudio()">stop</button>
  </div>

  <!-- Page label -->
  <div id="sense-label">Taste</div>

  <script src="mouth.js"></script>
</body>
</html>
